cue_rules:
  - name: unresolved_questions
    cue_phrases:
      - unresolved
      - open question
      - not answered
      - outstanding
      - didn't get answered
      - didn't get fully answered
      # v4 hotpatch (2026-05-05): broaden to common natural-English phrasings
      # that came up in 10-question validation. Use multi-word phrases (not
      # bare "fully answered") to avoid false-firing on "What was fully
      # answered?".
      - nobody fully answered
      - nobody answered
      - no one fully answered
      - no one answered
      - left unanswered
      - left hanging
      - without an answer
      - never answered
      - never got answered
      - hasn't been answered
    target_predicate:
      field: has_unresolved_question
      value: true
    delta: 0.040  # was 0.010 — v4 boost per spec 2026-05-03
    recruit: true  # v5: recruit flagged chunks into the pool (design D3)

  - name: decisions
    cue_phrases:
      - decision
      - decided
      - resolved
      - concluded
    target_predicate:
      field: decisions
      check: non_empty
    delta: 0.008

  - name: action_items
    cue_phrases:
      - action item
      - commit
      - commitment
      - next step
      - to-do
      - todo
      - homework
    target_predicate:
      field: action_items
      check: non_empty
    delta: 0.008

  - name: insights
    cue_phrases:
      - insight
      - realization
      - aha moment
      - key takeaway
    target_predicate:
      field: has_insight
      value: true
    delta: 0.006

  - name: referenced_prior
    cue_phrases:
      - referenced
      - prior call
      - last week
      - previously
      - discussed before
    target_predicate:
      field: references_prior
      value: true
    delta: 0.006

  - name: questions_general
    cue_phrases:
      - question
      - asked
    target_predicate:
      field: has_question
      value: true
    delta: 0.003

  - name: date_iso_match
    question_regex: '\b(\d{4}-\d{2}-\d{2})\b'
    match_field: session_date
    match_strategy: iso_date_equals
    delta: 0.04
    recruit: true  # v5: recruit date-matched chunks into the pool (design D3)

  - name: date_month_year_match
    question_regex: '\b(January|February|March|April|May|June|July|August|September|October|November|December)\s+(\d{4})\b'
    match_field: session_date
    match_strategy: month_year_overlap
    delta: 0.04
    recruit: true  # v5: recruit date-matched chunks into the pool (design D3)

  # v4 hotpatch (2026-05-05): natural-language date phrasings with day-of-month.
  # Validation surfaced that "March 4th, 2026" matches NO existing date rule
  # because the day is between month and year. This rule's regex tolerates an
  # optional ordinal suffix and comma so the captures (month, year) can flow
  # through month_year_overlap unchanged.
  - name: date_phrased_with_day
    question_regex: '\b(January|February|March|April|May|June|July|August|September|October|November|December)\s+\d{1,2}(?:st|nd|rd|th)?,?\s+(\d{4})\b'
    match_field: session_date
    match_strategy: month_year_overlap
    delta: 0.04
    recruit: true  # v5: recruit date-matched chunks into the pool (design D3)

  - name: date_relative_phrasing
    question_regex: '\b(early|mid|late)[-\s]+(January|February|March|April|May|June|July|August|September|October|November|December)(?:\s+(\d{4}))?\b'
    match_field: bm25_text
    match_strategy: token_overlap
    delta: 0.04
    recruit: true  # v5: recruit date-matched chunks into the pool (design D3)

  - name: date_quarter_match
    question_regex: '\b(Q[1-4])\s+(\d{4})\b'
    match_field: bm25_text
    match_strategy: token_overlap
    delta: 0.04
    recruit: true  # v5: recruit date-matched chunks into the pool (design D3)
