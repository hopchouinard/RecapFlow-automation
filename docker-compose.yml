services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=your_username
      - N8N_BASIC_AUTH_PASSWORD=your_password
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - N8N_SECURE_COOKIE=false
      - NODES_EXCLUDE=[]
      - NODE_FUNCTION_ALLOW_BUILTIN=fs,path
      - N8N_MIGRATE_FS_STORAGE_PATH=true
    ports:
      - "5678:5678"
    volumes:
      - ./data:/home/node/.n8n
      - ./watch:/home/node/watch
      - ./output:/home/node/output
      - ./historical:/home/node/historical:ro
      - ./n8n-state:/home/node/n8n-state
    depends_on:
      - db

  db:
    image: postgres:17
    container_name: n8n_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n
    volumes:
      - db_data:/var/lib/postgresql/data

  retrieval-server:
    build:
      context: ./community-brain
      dockerfile: Dockerfile
    container_name: community_brain_retrieval
    restart: unless-stopped
    ports:
      - "8999:8999"
    # env_file loads values directly into the container from the documented
    # location (community-brain/config/.env, created by operator from .env.example).
    # Defaults for container-internal paths and Ollama endpoint live in the
    # Dockerfile as ENV directives — those are lowest-precedence, so anything
    # operator sets in env_file (or shell, or this environment: block) wins.
    # env_file is optional so the container starts cleanly before the operator
    # has created it (useful for CI / first-time local bring-up).
    env_file:
      - path: ./community-brain/config/.env
        required: false
    volumes:
      - ./community-brain/config:/app/config
      - ./community-brain/lancedb:/data/lancedb
      - ./output:/data/output:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  open-webui:
    # Pinned to the EXACT image SHA that holds the workstation's historical
    # state (chats, prompts, custom models, filter). The :0.8.12 tag actually
    # points at a slightly different build whose alembic migration tree
    # references a revision (56359461a091) that the workstation's DB doesn't
    # know about — pinning by SHA bypasses that drift. Don't bump without
    # rehearsing the upgrade on a copy of the volume first.
    image: ghcr.io/open-webui/open-webui@sha256:b8095f79a6a8ffad8f830bdacc9b5b0aef805689b31bca0b065cc2424d3cfaeb
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      # OLLAMA_BASE_URL must point at the inference workstation over LAN.
      # NOT host.docker.internal — the VM host does not run Ollama.
      # Set the actual value in .env (or shell env at compose-up time).
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://10.1.50.219:11434}
      - WEBUI_AUTH=true
    volumes:
      - open-webui-data:/app/backend/data

volumes:
  db_data:
  # External so compose uses the literal `open-webui-data` volume
  # (the one Task 1.2 migrated 1.1 GB of state into) rather than
  # creating a project-prefixed `n8n_open-webui-data` from scratch.
  open-webui-data:
    external: true
