services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=your_username
      - N8N_BASIC_AUTH_PASSWORD=your_password
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - N8N_SECURE_COOKIE=false
      - NODES_EXCLUDE=[]
      - NODE_FUNCTION_ALLOW_BUILTIN=fs,path
    ports:
      - "5678:5678"
    volumes:
      - ./data:/home/node/.n8n
      - ./watch:/home/node/watch
      - ./output:/home/node/output
    depends_on:
      - db

  db:
    image: postgres:17
    container_name: n8n_db
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n
    volumes:
      - db_data:/var/lib/postgresql/data

  retrieval-server:
    build:
      context: ./community-brain
      dockerfile: Dockerfile
    container_name: community_brain_retrieval
    restart: unless-stopped
    ports:
      - "127.0.0.1:8999:8999"
    # env_file loads values directly into the container at the documented
    # location (community-brain/config/.env, created by operator from .env.example).
    # Shell-interpolated ${VAR:-default} values in `environment` still apply when
    # env_file is unset AND the shell env is unset — so both mechanisms coexist.
    # The env_file is marked optional so the container starts cleanly even before
    # an operator has created it (useful for CI / first-time local bring-up).
    env_file:
      - path: ./community-brain/config/.env
        required: false
    environment:
      - RETRIEVAL_HOST=0.0.0.0
      - RETRIEVAL_PORT=8999
      - LANCEDB_PATH=/data/lancedb/nomic-v1
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - COMMUNITY_BRAIN_CONFIG_DIR=/app/config
      - COMMUNITY_BRAIN_ARTIFACT_ROOT=/data/output
    volumes:
      - ./community-brain/config:/app/config
      - ./community-brain/lancedb:/data/lancedb
      - ./output:/data/output:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  db_data:
